<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Support</title>                          <!-- browser tab title -->
  <link rel="stylesheet" href="css/styles.css">           <!-- links the unified stylesheet -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script> <!-- loads socket.io client -->
</head>


<body class="user-layout">
  <div class="app-container">                              <!-- main wrapper for the user's chat interface -->


    <!-- Main Chat Workspace -->
    <div class="chat-area">


      <!-- Header with title and logout option -->
      <div class="chat-header">
        <h2 id="chatTitle">Support Chat</h2>
        <button onclick="logout()" style="background: transparent; color: var(--text-secondary);">Logout</button>
      </div>
      
      
      <!-- Container for message bubbles -->
      <div class="messages-list" id="messagesList">
        <!-- Messages will be rendered here by JS -->
      </div>


      <!-- Text entry and send button -->
      <div class="chat-input-area">
        <form class="chat-form" id="chatForm">
          <input type="text" id="messageInput" placeholder="Type a message..." required autocomplete="off">
          <button type="submit">Send</button>
        </form>
      </div>


    </div>
  </div>




  <!-- Logic Scripts -->
  <script src="js/api.js"></script>                        <!-- general API helper functions -->
  <script src="js/socket.js"></script>                     <!-- socket connection and event handlers -->
  <script src="js/chat.js"></script>                       <!-- logic for the user chat screen -->
</body>
</html>
