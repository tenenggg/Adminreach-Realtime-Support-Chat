<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=login.html"> <!-- tells the browser to redirect to login.html immediately -->
    <title>Redirecting...</title>                         <!-- fallback title while the page redirects -->
</head>


<body>
    <script>
        // Use Javascript redirect to ensure the user is sent to the login page if meta refresh fails
        window.location.href = 'login.html';              // changes the current window URL to login.html
    </script>
</body>
</html>
