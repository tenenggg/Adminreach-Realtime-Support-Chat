<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>                         <!-- sets the title visible on the browser tab -->
  <link rel="stylesheet" href="css/styles.css">           <!-- links the main styling file -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script> <!-- loads the Socket.io client library -->
</head>


<body>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  
  <div class="app-container">                              <!-- main wrapper for the dashboard layout -->


    <!-- Sidebar section containing the user list and search -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Users</h2>
        <button onclick="logout()" style="padding: 0.4rem; background: transparent; color: var(--text-secondary);">Logout</button> <!-- triggering the logout function -->
      </div>


      <!-- Search box to filter users -->
      <div class="search-container">
        <input type="text" id="userSearch" placeholder="Search for users..." autocomplete="off">
      </div>


      <!-- Dynamic list where we will inject user items from JS -->
      <ul class="user-list" id="userList">
        <!-- Users will be populated here -->
      </ul>
    </div>




    <!-- Main Chat section on the right -->
    <div class="chat-area">


      <!-- Header showing who we are currently chatting with -->
      <div class="chat-header" id="chatHeader" style="display: none;">
        <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle user list">☰</button>
        <h2 id="activeUserName">Select a user</h2>
        <button onclick="logout()" style="padding: 0.4rem; background: transparent; color: var(--text-secondary); font-size: 0.9rem;">Logout</button>
      </div>
      
      
      <!-- Scrollable area where messages appear -->
      <div class="messages-list" id="messagesList">
        <div class="empty-state">Select a user from the sidebar to start chatting</div> <!-- shown when no user is selected -->
      </div>


      <!-- Input bar at the bottom to send new messages -->
      <div class="chat-input-area" id="chatInputArea" style="display: none;">
        <form class="chat-form" id="chatForm">
          <input type="text" id="messageInput" placeholder="Type a message..." required autocomplete="off">
          <button type="submit">Send</button>
        </form>
      </div>


    </div>
  </div>




  <!-- Script inclusions (Logic Layers) -->
  <script src="js/api.js"></script>                        <!-- handling API calls -->
  <script src="js/socket.js"></script>                     <!-- handling real-time socket events -->
  <script src="js/admin.js"></script>                      <!-- main admin dashboard logic -->
</body>
</html>
